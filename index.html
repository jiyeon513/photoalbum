<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>가족 앨범</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <main class="album-grid">
      <div class="shelves">
        <section class="shelf-row">
          <div class="books">
            <article class="book">
              <button class="book-cover" type="button" style="--cover-bg: #94999e;">
                <div class="book-text">
                  <span class="book-title">여름 휴가</span>
                </div>
                <div class="book-icon" aria-hidden="true">
                  <svg viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="14" fill="#f4b942"/><path d="M24 6v6M24 36v6M6 24h6M36 24h6M10.5 10.5l4.2 4.2M33.3 33.3l4.2 4.2M10.5 37.5l4.2-4.2M33.3 14.7l4.2-4.2" stroke="#f4b942" stroke-width="3" stroke-linecap="round"/></svg>
                </div>
                <div class="book-logo" aria-hidden="true"></div>
              </button>
            </article>
            <article class="book">
              <button class="book-cover" type="button" style="--cover-bg: #9aab6e;">
                <div class="book-text">
                  <span class="book-title">봄 나들이</span>
                </div>
                <div class="book-icon" aria-hidden="true">
                  <svg viewBox="0 0 48 48" fill="none"><circle cx="24" cy="22" r="8" fill="#e85d5d"/><circle cx="16" cy="30" r="6" fill="#e85d5d"/><circle cx="32" cy="30" r="6" fill="#e85d5d"/><rect x="22" y="30" width="4" height="14" rx="2" fill="#5a8a3c"/></svg>
                </div>
                <div class="book-logo" aria-hidden="true"></div>
              </button>
            </article>
          </div>
          <div class="shelf-bar"></div>
        </section>

        <section class="shelf-row">
          <div class="books">
            <article class="book">
              <button class="book-cover" type="button" style="--cover-bg: #9a8bb0;">
                <div class="book-text">
                  <span class="book-title">아이들</span>
                </div>
                <div class="book-icon" aria-hidden="true">
                  <svg viewBox="0 0 48 48" fill="none"><circle cx="24" cy="14" r="7" fill="#f4d03f"/><path d="M12 40c0-8 5-12 12-12s12 4 12 12" fill="#f4d03f"/></svg>
                </div>
                <div class="book-logo" aria-hidden="true"></div>
              </button>
            </article>
            <article class="book">
              <button class="book-cover" type="button" style="--cover-bg: #7ec8e0;">
                <div class="book-text">
                  <span class="book-title">생일 파티</span>
                </div>
                <div class="book-icon" aria-hidden="true">
                  <svg viewBox="0 0 48 48" fill="none"><rect x="10" y="28" width="28" height="10" rx="3" fill="#f4d03f"/><rect x="14" y="20" width="20" height="10" rx="2" fill="#f4d03f"/><path d="M24 10v10" stroke="#f4d03f" stroke-width="3" stroke-linecap="round"/><circle cx="24" cy="8" r="3" fill="#ff8fab"/></svg>
                </div>
                <div class="book-logo" aria-hidden="true"></div>
              </button>
            </article>
          </div>
          <div class="shelf-bar"></div>
        </section>

        <section class="shelf-row shelf-row--envelope">
          <div class="books books--envelope">
            <article class="envelope">
              <button class="envelope-cover" type="button">
                <div class="envelope-flap" aria-hidden="true"></div>
                <div class="envelope-fold-left" aria-hidden="true"></div>
                <div class="envelope-fold-right" aria-hidden="true"></div>
                <span class="envelope-title">카드</span>
              </button>
            </article>
          </div>
        </section>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
