<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>가족 앨범</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <div id="home-view" class="view">
      <main class="album-grid">
        <div class="shelves">
          <section class="shelf-row">
            <div class="books">
              <article class="book">
                <button class="book-cover" type="button" data-album="할아버지.할머니" style="--cover-bg: #f3aa85;">
                <div class="book-text">
                  <span class="book-title book-title--compact">할아버지<br>할머니</span>
                </div>
                <div class="book-icon" aria-hidden="true">
                  <svg viewBox="0 0 48 48" fill="none"><rect x="20" y="28" width="8" height="14" rx="1" fill="#5a8a3c"/><circle cx="24" cy="18" r="13" fill="#6b9e4a"/></svg>
                </div>
                <div class="book-logo" aria-hidden="true"></div>
              </button>
            </article>
            <article class="book">
                <button class="book-cover" type="button" data-album="아들.딸" style="--cover-bg: #9fbe66;">
                <div class="book-text">
                  <span class="book-title">아들.딸</span>
                </div>
                <div class="book-icon" aria-hidden="true">
                  <svg viewBox="0 0 48 48" fill="none"><circle cx="17" cy="30" r="7" fill="#e85d4a"/><circle cx="31" cy="31" r="6.5" fill="#f4b942"/><ellipse cx="24" cy="18" rx="5" ry="3" fill="#5a9a3a" transform="rotate(-20 24 18)"/></svg>
                </div>
                <div class="book-logo" aria-hidden="true"></div>
              </button>
            </article>
          </div>
          <div class="shelf-bar"></div>
        </section>

        <section class="shelf-row">
          <div class="books">
            <article class="book">
                <button class="book-cover" type="button" data-album="손주들" style="--cover-bg: #c39be8;">
                <div class="book-text">
                  <span class="book-title">손주들</span>
                </div>
                <div class="book-icon" aria-hidden="true">
                  <svg viewBox="0 0 48 48" fill="none"><path d="M24 40V24" stroke="#5a9a3a" stroke-width="3" stroke-linecap="round"/><ellipse cx="17" cy="26" rx="7" ry="5" fill="#8ed66a" transform="rotate(-35 17 26)"/><ellipse cx="31" cy="26" rx="7" ry="5" fill="#8ed66a" transform="rotate(35 31 26)"/></svg>
                </div>
                <div class="book-logo" aria-hidden="true"></div>
              </button>
            </article>
            <article class="book">
                <button class="book-cover" type="button" data-album="단체사진" style="--cover-bg: #7ec8e0;">
                <div class="book-text">
                  <span class="book-title">단체<br>사진</span>
                </div>
                <div class="book-icon" aria-hidden="true">
                  <svg viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="12" fill="#f4b942"/><path d="M24 8v5M24 35v5M8 24h5M35 24h5M12.5 12.5l3.5 3.5M32 32l3.5 3.5M12.5 35.5l3.5-3.5M32 16l3.5-3.5" stroke="#f4b942" stroke-width="2.5" stroke-linecap="round"/></svg>
                </div>
                <div class="book-logo" aria-hidden="true"></div>
              </button>
            </article>
          </div>
          <div class="shelf-bar"></div>
        </section>

        <section class="shelf-row shelf-row--envelope">
          <div class="books books--envelope">
            <article class="envelope">
              <button class="envelope-cover" type="button" data-album="카드">
                <div class="envelope-flap" aria-hidden="true"></div>
                <div class="envelope-fold-left" aria-hidden="true"></div>
                <div class="envelope-fold-right" aria-hidden="true"></div>
                <span class="envelope-title">카드</span>
              </button>
            </article>
          </div>
        </section>
      </div>
    </main>
    </div>

    <div id="album-view" class="view album-view view--hidden">
      <header class="gallery-header">
        <button class="gallery-back" type="button" aria-label="뒤로 가기">
          <svg width="20" height="14" viewBox="0 0 20 14" fill="none"><path d="M7 1L1 7L7 13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M1 7H19" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        </button>
        <h1 class="gallery-title"></h1>
        <button class="gallery-add" type="button" aria-label="사진 추가" aria-haspopup="true" aria-expanded="false">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
        </button>
      </header>

      <div class="add-photo-menu view--hidden" role="menu" aria-label="사진 추가 방법">
        <button class="add-photo-option" type="button" data-source="camera" role="menuitem">카메라로 촬영</button>
        <button class="add-photo-option" type="button" data-source="gallery" role="menuitem">갤러리에서 선택</button>
      </div>

      <div class="add-card-menu view--hidden" role="menu" aria-label="카드 추가 방법">
        <button class="add-card-option" type="button" role="menuitem">편지 쓰기</button>
      </div>

      <input id="camera-input" class="photo-input" type="file" accept="image/*" capture="environment" hidden />
      <input id="gallery-input" class="photo-input" type="file" accept="image/*" multiple hidden />

      <div class="gallery-scroll">
        <div class="masonry"></div>
        <div class="card-grid view--hidden"></div>
      </div>

      <div class="letter-compose view--hidden">
        <div class="letter-compose-body">
          <label class="letter-compose-label" for="letter-to-input">To.</label>
          <input id="letter-to-input" class="letter-field" type="text" placeholder="받는 사람" autocomplete="off" />

          <label class="letter-compose-label" for="letter-input">편지 내용</label>
          <textarea id="letter-input" class="letter-input" placeholder="마음을 담아 편지를 써 보세요."></textarea>

          <label class="letter-compose-label" for="letter-from-input">From.</label>
          <input id="letter-from-input" class="letter-field" type="text" placeholder="보내는 사람" autocomplete="off" />

          <button id="letter-create-btn" class="letter-create-btn" type="button">편지 생성하기</button>
        </div>
      </div>

      <div class="photo-detail view--hidden">
        <img class="photo-detail-img" alt="" />
        <div class="photo-detail-actions">
          <button class="photo-action-btn photo-save-btn" type="button" aria-label="사진 저장하기">
            <svg class="photo-action-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M12 3V15M12 15L8 11M12 15L16 11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M4 17V19C4 20.1046 4.89543 21 6 21H18C19.1046 21 20 20.1046 20 19V17" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <span>사진 저장하기</span>
          </button>
          <button class="photo-action-btn photo-delete-btn" type="button" aria-label="사진 삭제하기">
            <svg class="photo-action-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M4 7H20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M9 7V5C9 4.44772 9.44772 4 10 4H14C14.5523 4 15 4.44772 15 5V7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M7 7L8 19C8 20.1046 8.89543 21 10 21H14C15.1046 21 16 20.1046 16 19L17 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>사진 삭제하기</span>
          </button>
        </div>
      </div>

      <div class="letter-read view--hidden">
        <div class="letter-read-body">
          <p class="letter-read-to"></p>
          <p class="letter-read-text"></p>
          <p class="letter-read-from"></p>
        </div>
        <button class="letter-delete-btn" type="button">삭제</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="shared-photos.js"></script>
  <script src="app.js"></script>
</body>
</html>
